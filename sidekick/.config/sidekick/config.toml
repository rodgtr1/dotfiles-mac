# Sidekick configuration — ~/.config/sidekick/config.toml (stowed from dotfiles-mac)
#
# IMPORTANT: Sidekick's parser is strict — EVERY key below must be present and
# uncommented. Commenting one out makes the whole file fail to parse, and
# Sidekick silently falls back to its built-in defaults (Menlo, size 13).
# To change a setting, edit the VALUE here; never delete or comment a key.
#
# Also: changing settings in the in-app Preferences panel rewrites this file
# atomically, which replaces the stow symlink with a real file (and strips these
# comments). Prefer editing this file directly, then relaunch Sidekick.
#
# The "valid values" comments below are the authoritative choices the app
# offers (i.e. what the Preferences dropdowns expose). Free-form string fields
# accept anything, but enum-like fields silently fall back to a default when
# given an unrecognized value (noted per-field).

[font]
# family: any installed font name (free-form). The Preferences dropdown lists
#   monospaced families only. On THIS machine the dropdown currently offers:
#     Andale Mono, Arial Unicode MS, Courier New,
#     FiraCode Nerd Font, FiraCode Nerd Font Mono, FiraCode Nerd Font Propo,
#     Hack Nerd Font, Hack Nerd Font Mono, Hack Nerd Font Propo,
#     JetBrains Mono,
#     JetBrainsMono Nerd Font, JetBrainsMono Nerd Font Mono, JetBrainsMono Nerd Font Propo,
#     JetBrainsMonoNL Nerd Font, JetBrainsMonoNL Nerd Font Mono, JetBrainsMonoNL Nerd Font Propo,
#     Menlo,
#     MesloLG{L,M,S}{,DZ} Nerd Font {,Mono,Propo} variants,
#     Monaco, PT Mono, SF Mono
#   (To regenerate this list: open Preferences ▸ Terminal ▸ Font, or run the
#    fonts.swift snippet that mirrors the app's NSFontManager filter.)
# size: integer points. Preferences slider range: 8–24.
# bold_is_bright: true | false
family = "JetBrainsMono Nerd Font"
size = 17
bold_is_bright = true

[cursor]
# shape: "block" | "ibeam" | "underline"  (unrecognized values are accepted
#   as-is but behave unpredictably — stick to these three).
# blink: true | false
shape = "block"
blink = true

[window]
# opacity: 0.0–1.0 double (Preferences slider clamps to 0.3–1.0). Only visible
#   when enable_blur = true.
# enable_blur: true | false  (translucent terminal with desktop blur behind).
# padding: integer pixels of inset around the terminal content.
opacity = 0.9
enable_blur = true
padding = 8

[behavior]
# scrollback_lines: integer; use -1 for unlimited.
# all other keys here are true | false.
scrollback_lines = 10000
scroll_on_output = false
scroll_on_keystroke = true
allow_hyperlinks = true
mouse_autohide = true
audible_bell = false
restore_session = true

[shell]
# program: shell path (free-form); "" = use the $SHELL environment variable.
# args: array of strings passed to the shell, e.g. ["-l"].
# default_cwd: starting directory (free-form path); "~" expands to home.
program = ""
args = []
default_cwd = "~"

[diff]
# context_lines: integer number of unchanged lines shown around each change.
context_lines = 3

[editor]
# file_open_mode: "terminal" (open files in the terminal editor) |
#   "builtin" (open in Sidekick's built-in editor). Any other value falls back
#   to terminal mode.
# font_family: any font name (free-form); "" = system default monospace.
# font_size: integer points. Preferences slider range: 8–32.
# word_wrap, show_hidden_files: true | false
file_open_mode = "builtin"
font_family = "JetBrainsMono Nerd Font"
font_size = 17
word_wrap = true
show_hidden_files = true

[theme]
# name: one of the built-in themes, "auto", or a custom theme (see below).
#   Built-in themes:
#     "catppuccin-mocha"  — dark  (this is also the fallback for unknown names)
#     "catppuccin-latte"  — light
#     "min-light"         — light
#   "auto" follows the macOS system light/dark setting.
#   Custom themes: drop a *.json file in ~/.config/sidekick/themes/ and use its
#     name here (custom names cannot shadow the built-ins above).
#   NOTE: an unrecognized/misspelled name silently falls back to catppuccin-mocha.
name = "catppuccin-mocha"

[hosts]
# show_teleport: true | false  (show Teleport hosts in the sidebar).
show_teleport = false

