[approval]
always_ask = []
auto_allow = []
mode = 'auto'

[behavior]
allow_hyperlinks = true
audible_bell = false
mouse_autohide = true
restore_session = false
scroll_on_keystroke = true
scroll_on_output = false
scrollback_lines = 10000

[cursor]
blink = true
shape = 'block'

[diff]
context_lines = 3

[editor]
file_open_mode = 'builtin'
font_family = 'JetBrainsMono Nerd Font'
font_size = 17
show_hidden_files = true
word_wrap = true

[font]
bold_is_bright = true
family = 'JetBrainsMono Nerd Font'
size = 17

[hosts]
show_teleport = false

[shell]
args = []
default_cwd = '~'
program = ''

[theme]
name = 'catppuccin-mocha'

[window]
enable_blur = true
opacity = 0.95645065539513685
padding = 8